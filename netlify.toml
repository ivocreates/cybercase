# Netlify Configuration for CyberCase Hunt

[build]
  # No build command needed for static site
  publish = "."
  
# Redirect rules for SPA-like behavior
[[redirects]]
  from = "/signup"
  to = "/signup-enhanced.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin-panel.html"
  status = 200

# Custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers for Firebase/API calls
[[headers]]
  for = "/firebase-config.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Cache static assets
[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
