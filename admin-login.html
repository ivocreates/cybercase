<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CyberCase</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="back-btn">← Back</a>
            <div class="auth-header">
                <h1>🔐 Admin Access</h1>
                <p>Authorized Personnel Only</p>
            </div>

            <form id="admin-login-form" class="auth-form">
                <div class="form-group">
                    <label for="admin-email">📧 Admin Email</label>
                    <input type="email" id="admin-email" class="form-control" required placeholder="admin@spkcollege.edu">
                </div>

                <div class="form-group">
                    <label for="admin-password">🔒 Admin Password</label>
                    <input type="password" id="admin-password" class="form-control" required placeholder="Enter admin password">
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn btn-primary btn-block">
                    <span>Access Admin Panel</span>
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
