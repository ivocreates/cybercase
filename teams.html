<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Teams - CyberCase</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/leaderboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .teams-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .team-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
        }
        .team-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
        }
        .team-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        .team-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 8px 0;
        }
        .team-leader {
            color: var(--accent-color);
            font-weight: 600;
        }
        .team-stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .join-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: var(--primary-color);
            color: var(--darker-bg);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .join-btn:hover {
            background: var(--accent-color);
            transform: scale(1.05);
        }
        .no-teams {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .no-teams h3 {
            color: var(--warning);
            margin-bottom: 15px;
        }
        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }
        .search-box {
            flex: 1;
            max-width: 400px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .team-count {
            color: var(--text-secondary);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <a href="index.html">🔍 CyberCase Hunt</a>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="teams.html" class="active">👥 Teams</a>
            <a href="leaderboard.html">🏆 Leaderboard</a>
            <a href="announcements.html">📢 Announcements</a>
        </div>
    </nav>

    <div class="teams-container">
        <header class="page-header">
            <h1>👥 Available Teams</h1>
            <p>Find a team to join or see all registered teams</p>
        </header>

        <div class="filter-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 Search teams by name...">
            </div>
            <div class="team-count" id="team-count">
                Loading teams...
            </div>
        </div>

        <div class="teams-grid" id="teams-grid">
            <!-- Teams will be loaded here -->
        </div>

        <div class="no-teams" id="no-teams" style="display: none;">
            <h3>📭 No Teams Yet</h3>
            <p>Be the first to create a team!</p>
            <a href="signup-enhanced.html?role=leader" class="btn btn-primary" style="display: inline-block; margin-top: 20px;">Create Team</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/teams.js"></script>
</body>
</html>
